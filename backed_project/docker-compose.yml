services:
  # AI Gateway Microservice
  ai_gateway:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: smarthome_ai_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 将当前目录挂载到容器，实现代码热重载，避免污染宿主机
      - .:/app
      - /app/__pycache__
      - /app/.venv
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - SERVICE_ROLE=ai_gateway
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smarthome_network

  # Device Shadow Microservice
  device_shadow:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: smarthome_device_shadow
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - SERVICE_ROLE=device_shadow
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smarthome_network

  # IoT Core Platform Microservice
  iot_core:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: smarthome_iot_core
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - SERVICE_ROLE=iot_core
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smarthome_network

  # Data Flywheel & OTA Microservice
  data_flywheel:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: smarthome_data_flywheel
    restart: unless-stopped
    ports:
      - "8003:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - SERVICE_ROLE=data_flywheel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smarthome_network

  # PostgreSQL Database Service
  db:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: smarthome_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smarthome_db}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smarthome_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome_network

  # Redis Cache & Shadow Service
  redis:
    image: docker.m.daocloud.io/library/redis:7.0.15-alpine
    container_name: smarthome_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome_network

volumes:
  postgres_data:
  redis_data:

networks:
  smarthome_network:
    driver: bridge
