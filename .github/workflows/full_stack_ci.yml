name: Full Stack CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  frontend-tests:
    name: Frontend (Flutter) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fronted_project
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install Dependencies
        run: flutter pub get
      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze Code
        run: flutter analyze
      - name: Run Unit Tests
        run: flutter test

  backend-tests:
    name: Backend (FastAPI) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backed_project
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run Pytest
        run: pytest

  lint-and-docs:
    name: Documentation & Wiki Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v3
      - name: Run Wiki Sync Script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: bash .github/scripts/sync_wiki.sh
